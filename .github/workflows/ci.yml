name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # NOTE: pinned to ubuntu-22.04 (not ubuntu-latest). Ubuntu 24.04
        # ships only libssl 3.0; .NET 5's runtime crashes on test host
        # startup with "No usable version of libssl was found" because it
        # was built against libssl 1.1. 22.04 still ships libssl 1.1.
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 5.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '5.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test (Core only)
        run: dotnet test tests/MapSlopper.Core.Tests/MapSlopper.Core.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: CLI smoke test - build square-room
        run: dotnet run --project src/MapSlopper.Cli --configuration Release --no-build -- build samples/square-room/square-room.mapsproj.json -o square-room.map

      - name: CLI smoke test - validate l-shaped
        run: dotnet run --project src/MapSlopper.Cli --configuration Release --no-build -- validate samples/l-shaped/l-shaped.mapsproj.json

      - name: CLI smoke test - validate stepped-floor
        run: dotnet run --project src/MapSlopper.Cli --configuration Release --no-build -- validate samples/stepped-floor/stepped-floor.mapsproj.json
