name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-22.04
            rid: linux-x64
            archive: tar
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 5.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '5.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish CLI (framework-dependent)
        run: dotnet publish src/MapSlopper.Cli/MapSlopper.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --no-self-contained
          --output publish/${{ matrix.rid }}/cli

      - name: Publish GUI (framework-dependent)
        run: dotnet publish src/MapSlopper.Gui/MapSlopper.Gui.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --no-self-contained
          --output publish/${{ matrix.rid }}/gui

      - name: Copy samples and docs
        shell: bash
        run: |
          mkdir -p publish/${{ matrix.rid }}/samples
          cp -r samples/* publish/${{ matrix.rid }}/samples/
          cp README.md publish/${{ matrix.rid }}/README.md
          cp -r docs publish/${{ matrix.rid }}/docs

      - name: Archive (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath MapSlopper-${{ matrix.rid }}.zip

      - name: Archive (tar.gz, Linux)
        if: matrix.archive == 'tar'
        run: |
          tar -czf MapSlopper-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Automated build from commit `${{ github.sha }}`

            > ${{ github.event.head_commit.message }}
          prerelease: true
          files: |
            MapSlopper-${{ matrix.rid }}.zip
            MapSlopper-${{ matrix.rid }}.tar.gz
          fail_on_unmatched_files: false
